hi=안녕하세요.\n\t반갑습니다.\n\t오늘도 즐거운 하루 되세요!
등록=안녕하세요!\n\t 교육센터에 오신 걸 환영해요.\n\t궁금한 게 있으신가요?
안녕하세요=어서 오세요!\n\t 오늘 기분은 좀 어떠신가요?
잠시만요=잠시만 기다려 주시겠어요?\n\t금방 확인해 드릴게요.
나중에봐요=지금은 제가 수업 중이라\n\t 확인이 늦을 수 있어요.\n\t끝나고 바로 연락드릴게요!
잘자요=오늘 공부하느라\n\t 수고 많았어요.\n\t푹 쉬고 내일 만나요.
주말인사=즐거운 주말 보내세요!\n\t공부도 좋지만 휴식도 중요하답니다.
오랜만=우와, 진짜 오랜만이시네요!\n\t그동안 잘 지내셨나요?
상담종료=더 궁금한 건 없으신가요?\n\t그럼 상담 마칠게요. 좋은 하루 되세요!
응원=할 수 있어요!\n\t 제가 끝까지 도와드릴 테니까\n\t 걱정 마세요.